[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# 测试文件模式
python_files = test_*.py *_test.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=agent_framework
    --cov-report=term-missing
    --cov-report=html:htmlcov

# 覆盖率配置
[coverage:run]
source = agent_framework
omit =
    */tests/*
    */__init__.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
